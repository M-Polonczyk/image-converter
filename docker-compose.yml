version: '3.8'

services:
  image-converter:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - PORT=5000
      - UPLOAD_FOLDER=uploads
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src  # For development hot-reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
